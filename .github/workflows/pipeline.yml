name: pipeline
on:
  workflow_dispatch:
    inputs:
      region:
        description: "Region (data/<region>/)"
        default: "ap"
      max_calls:
        description: "Places API call cap this run"
        default: "999999"
      source:
        description: "Location source: free (Overture) or google"
        default: "free"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REGION: ${{ github.event.inputs.region || 'ap' }}
      SOURCE: ${{ github.event.inputs.source || 'free' }}
      MAX_CALLS: ${{ github.event.inputs.max_calls || '999999' }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      EE_SA_JSON: ${{ secrets.EE_SA_JSON }}
      EE_PROJECT: ${{ secrets.EE_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -q shapely requests beautifulsoup4 earthengine-api overturemaps pyarrow pandas

      - name: "Stage A: OSM churches (keyless)"
        continue-on-error: true
        run: python3 scripts/04_osm_churches.py

      - name: "Stage B: Catholic calibration (keyless)"
        continue-on-error: true
        run: python3 scripts/07_catholic_calibration.py

      - name: "Stage C-free: Overture open places (no cost)"
        if: env.SOURCE == 'free'
        run: python3 scripts/02_open_places.py

      - name: "Stage C: Google Places sweep (paid, only when source=google)"
        if: env.SOURCE == 'google' && env.GOOGLE_MAPS_API_KEY != ''
        run: python3 scripts/03_places_sweep.py

      - name: "Stage D: merge"
        run: python3 scripts/06_analyze.py merge

      - name: "Checkpoint: commit sweep + merge results"
        run: |
          git config user.name "svsashank"
          git config user.email "svsashank@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "checkpoint: sweep + merge $(date -u +%H:%MZ)"
          git push || true

      - name: "Stage E: Earth Engine building dating (needs EE_SA_JSON + EE_PROJECT secrets)"
        if: env.EE_SA_JSON != ''
        run: |
          echo "$EE_SA_JSON" > /tmp/sa.json
          rm -f data/ee_error.txt
          python3 scripts/05_ee_building_dates.py --project "$EE_PROJECT" --sa-key /tmp/sa.json 2>&1 | tee /tmp/ee.log || true
          if [ ! -f data/$REGION/churches_dated.json ]; then tail -40 /tmp/ee.log > data/ee_error.txt; fi

      - name: "Stage F: report + map data"
        if: env.EE_SA_JSON != ''
        run: |
          if [ -f data/$REGION/churches_dated.json ]; then python3 scripts/06_analyze.py report; fi

      - name: Commit results
        if: always()
        run: |
          git config user.name "svsashank"
          git config user.email "svsashank@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "pipeline run: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
